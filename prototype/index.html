<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Buku Saku OB - Aplikasi Pendamping Office Boy</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Tailwind Configuration for customized styles -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            primary: '#4F46E5', // Indigo
            success: '#10B981', // Hijau
            danger: '#EF4444',  // Merah
            warning: '#F59E0B', // Kuning/Oranye
            obBg: '#F3F4F6',
            obCard: '#FFFFFF',
            obText: '#111827',
            obTextSec: '#6B7280'
          }
        }
      }
    }
  </script>
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* Hide scrollbars but allow scrolling */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
    /* Smooth transition for bottom sheet */
    .modal-transition {
      transition: transform 0.3s ease-out, opacity 0.3s ease-out;
    }
    /* Hide up/down number spin buttons */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] {
      -moz-appearance: textfield;
    }
  </style>
</head>
<body class="bg-slate-900 text-slate-800 font-sans min-h-screen flex items-center justify-center p-0 sm:p-4 select-none">

  <!-- Mobile Screen Container Shell -->
  <div class="relative w-full max-w-md h-[100vh] sm:h-[840px] bg-gray-100 flex flex-col overflow-hidden sm:rounded-[36px] sm:shadow-2xl sm:border-8 sm:border-slate-950">
    
    <!-- Toast Notification Overlay -->
    <div id="toast-container" class="absolute top-12 left-4 right-4 z-50 pointer-events-none flex flex-col gap-2">
      <!-- Toasts will be injected here -->
    </div>

    <!-- Bottom Sheet Modal Backdrop -->
    <div id="modal-backdrop" class="absolute inset-0 bg-black/40 z-40 hidden transition-opacity duration-300 flex items-end justify-center">
      <!-- Bottom Sheet Modal Card -->
      <div id="modal-container" class="bg-white rounded-t-3xl w-full p-6 space-y-4 transform translate-y-full modal-transition pb-10 shadow-2xl">
        <!-- Content will be injected dynamically -->
      </div>
    </div>

    <!-- Phone Status Bar -->
    <div class="h-8 bg-white text-slate-500 flex justify-between items-center px-4 pt-1.5 shrink-0 z-30 select-none">
      <span id="statusBarTime" class="text-[10px] font-bold font-mono">12:00</span>
      <div class="flex items-center gap-2">
        <button onclick="triggerSyncSimulation()" title="Sync status" class="flex items-center gap-1 text-[9px] font-bold text-amber-500">
          <i id="syncIcon" data-lucide="cloud-off" class="w-3 h-3 text-amber-500"></i>
          <span id="syncText">Lokal</span>
        </button>
        <div class="flex items-center gap-0.5">
          <i data-lucide="wifi" class="w-3 h-3"></i>
          <i data-lucide="battery" class="w-3.5 h-3.5"></i>
        </div>
      </div>
    </div>

    <!-- App Header Bar -->
    <header class="bg-white border-b border-slate-100 px-4 py-3 flex justify-between items-center shrink-0 z-20">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-lg bg-indigo-50 flex items-center justify-center text-indigo-600 shrink-0">
          <i data-lucide="pocket" class="w-4.5 h-4.5"></i>
        </div>
        <div>
          <h1 id="screen-title" class="font-bold text-slate-900 text-sm tracking-tight">Buku Saku OB</h1>
          <p id="screen-subtitle" class="text-[9px] text-slate-400 font-medium mt-0.5">Sistem Kas & Pesanan Harian</p>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <button onclick="handleLogout()" title="Keluar Akun" class="p-1.5 bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition border border-red-200/50 shadow-sm">
          <i data-lucide="log-out" class="w-3.5 h-3.5"></i>
        </button>
      </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-content" class="flex-1 overflow-y-auto no-scrollbar px-4 py-4 pb-24 space-y-4">
      <!-- Screens are rendered here by JavaScript -->
    </main>

    <!-- Floating Action Button (FAB) -->
    <button id="main-fab" onclick="handleFabClick()" class="absolute bottom-20 right-4 w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center shadow-lg shadow-indigo-900/30 active:scale-95 transition z-30">
      <i id="fab-icon" data-lucide="plus" class="w-7 h-7"></i>
    </button>

    <!-- Bottom Navigation Bar -->
    <nav class="absolute bottom-0 left-0 right-0 bg-white border-t border-slate-200/80 px-2 py-3 flex justify-around items-center z-30 shadow-lg">
      <button onclick="switchScreen('pesanan')" id="nav-pesanan" class="flex flex-col items-center gap-0.5 text-indigo-600 font-bold transition">
        <i data-lucide="clipboard-list" class="w-5.5 h-5.5"></i>
        <span class="text-[9px]">Pesanan</span>
      </button>
      <button onclick="switchScreen('kas')" id="nav-kas" class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-slate-600 transition">
        <i data-lucide="users" class="w-5.5 h-5.5"></i>
        <span class="text-[9px]">Buku Kas</span>
      </button>
      <button onclick="switchScreen('belanja')" id="nav-belanja" class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-slate-600 transition">
        <i data-lucide="shopping-cart" class="w-5.5 h-5.5"></i>
        <span class="text-[9px]">Kalkulator</span>
      </button>
      <button onclick="switchScreen('absen')" id="nav-absen" class="flex flex-col items-center gap-0.5 text-slate-400 hover:text-slate-600 transition">
        <i data-lucide="clock" class="w-5.5 h-5.5"></i>
        <span class="text-[9px]">Absensi</span>
      </button>
    </nav>

  </div>

  <!-- JavaScript App Logic -->
  <script>
    // --- DATABASE & DATA MANAGERS ---
    const DEFAULT_EMPLOYEES = [
      { id: 'emp-1', nama: 'Budi Hartono', telepon: '6281234567890', deposit: 0, hutang: 28000 },
      { id: 'emp-2', nama: 'Rina Rahmawati', telepon: '6289876543210', deposit: 50000, hutang: 0 },
      { id: 'emp-3', nama: 'Doni Setiawan', telepon: '6287654321098', deposit: 0, hutang: 0 }
    ];

    const DEFAULT_ORDERS = [
      { id: 'ord-1', karyawanId: 'emp-1', barang: 'Kopi Hitam Double Shot', titipan: 0, realHarga: 0, status: 'BELUM_DIBELI', tanggal: '2026-06-15T10:00:00Z' },
      { id: 'ord-2', karyawanId: 'emp-1', barang: 'Nasi Uduk Ayam Goreng', titipan: 0, realHarga: 0, status: 'BELUM_DIBELI', tanggal: '2026-06-15T10:15:00Z' },
      { id: 'ord-3', karyawanId: 'emp-2', barang: 'Es Teh Manis Selasih', titipan: 0, realHarga: 5000, status: 'SELESAI', tanggal: '2026-06-14T14:30:00Z' }
    ];

    const DEFAULT_LEDGER = [
      { id: 'led-1', karyawanId: 'emp-1', tipe: 'PESANAN', nominal: -8000, keterangan: 'Beli: Kopi Hitam Double Shot', tanggal: '2026-06-14T10:00:00Z' },
      { id: 'led-2', karyawanId: 'emp-1', tipe: 'PESANAN', nominal: -20000, keterangan: 'Beli: Nasi Uduk Ayam Goreng', tanggal: '2026-06-14T10:15:00Z' },
      { id: 'led-3', karyawanId: 'emp-2', tipe: 'TOPUP', nominal: 55000, keterangan: 'Deposit Tunai Awal', tanggal: '2026-06-14T09:00:00Z' },
      { id: 'led-4', karyawanId: 'emp-2', tipe: 'PESANAN', nominal: -5000, keterangan: 'Beli: Es Teh Manis Selasih', tanggal: '2026-06-14T14:30:00Z' }
    ];

    // Local Storage Initializers
    function getDB(key, defaults) {
      const data = localStorage.getItem('ob_' + key);
      if (!data) {
        localStorage.setItem('ob_' + key, JSON.stringify(defaults));
        return defaults;
      }
      return JSON.parse(data);
    }

    function saveDB(key, data) {
      localStorage.setItem('ob_' + key, JSON.stringify(data));
    }

    // Money Input Formatter Helpers
    function formatNumberInput(input) {
      let value = input.value.replace(/\D/g, "");
      if (value) {
        input.value = parseInt(value, 10).toLocaleString('id-ID');
      } else {
        input.value = "";
      }
    }

    // Parse Formatted Number to Integer/Float
    function parseFormattedNumber(valString) {
      if (!valString) return 0;
      return parseFloat(valString.replace(/\./g, "")) || 0;
    }

    // Capitalize First Letter of a String (e.g. for items: "kopi susu" -> "Kopi susu")
    function capitalizeFirst(str) {
      if (!str) return "";
      const trimmed = str.trim();
      return trimmed.charAt(0).toUpperCase() + trimmed.slice(1);
    }

    // Capitalize First Letter of Each Word (e.g. for names: "budi hartono" -> "Budi Hartono")
    function capitalizeWords(str) {
      if (!str) return "";
      return str.trim().split(/\s+/).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" ");
    }

    let employees = getDB('employees', DEFAULT_EMPLOYEES);
    
    // Auto migration to separate deposit & hutang
    let migrated = false;
    employees.forEach(emp => {
      if (emp.deposit === undefined || emp.hutang === undefined) {
        if (emp.saldo !== undefined) {
          if (emp.saldo > 0) {
            emp.deposit = emp.saldo;
            emp.hutang = 0;
          } else {
            emp.deposit = 0;
            emp.hutang = Math.abs(emp.saldo);
          }
          delete emp.saldo;
        } else {
          emp.deposit = 0;
          emp.hutang = 0;
        }
        migrated = true;
      }
    });
    if (migrated) {
      saveDB('employees', employees);
    }

    let orders = getDB('orders', DEFAULT_ORDERS);
    let ledger = getDB('ledger', DEFAULT_LEDGER);
    let attendance = getDB('attendance', []);
    let shoppingList = getDB('shoppingList', []);
    let shoppingBudget = localStorage.getItem('ob_budget') ? parseFloat(localStorage.getItem('ob_budget')) : 500000;
    let shoppingHistory = getDB('shoppingHistory', []);

    // Global state
    let activeScreen = 'splash';
    let currentLedgerEmployeeId = null;
    let orderTabFilter = 'belum'; // 'belum' atau 'selesai'
    let belanjaTabFilter = 'troli'; // 'troli' atau 'riwayat'
    let attendanceFilterFrom = '';
    let attendanceFilterTo = '';
    let pendingTel = '';
    let pendingNama = '';
    let pendingPin = '';

    // --- APPLICATION BOOTSTRAP ---
    window.onload = () => {
      // Set default attendance date range
      const today = new Date().toISOString().split('T')[0];
      attendanceFilterFrom = today.substring(0, 8) + '01'; // First day of current month
      attendanceFilterTo = today;

      // Start clock
      updateClock();
      setInterval(updateClock, 1000);

      // Render default screen
      switchScreen('splash');
    };

    function updateClock() {
      const timeStr = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');
      document.getElementById('statusBarTime').innerText = timeStr;
      
      const clockEl = document.getElementById('digitalClock');
      if (clockEl) {
        clockEl.innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }).replace(/\./g, ':');
      }
    }

    // --- SCREEN NAVIGATION CONTROLLER ---
    function switchScreen(screenKey) {
      activeScreen = screenKey;
      
      const isMainApp = ['pesanan', 'kas', 'belanja', 'absen'].includes(screenKey);
      const header = document.querySelector('header');
      const nav = document.querySelector('nav');
      const fab = document.getElementById('main-fab');
      const appContent = document.getElementById('app-content');

      if (isMainApp) {
        header.classList.remove('hidden');
        nav.classList.remove('hidden');
        appContent.className = "flex-grow overflow-y-auto no-scrollbar px-4 py-4 pb-24 space-y-4 flex flex-col min-h-0";

        // Update Header Text
        const screenTitles = {
          pesanan: { title: "Daftar Pesanan", sub: "Sistem Kas & Pesanan Harian" },
          kas: { title: "Buku Kas Karyawan", sub: "Laporan Saldo & Riwayat Talangan" },
          belanja: { title: "Kalkulator Belanja", sub: "Pelacakan Budget Stok Kantor" },
          absen: { title: "Absen Mandiri OB", sub: "Pencatatan Jam Kerja Pribadi" }
        };
        
        document.getElementById('screen-title').innerText = screenTitles[screenKey].title;
        document.getElementById('screen-subtitle').innerText = screenTitles[screenKey].sub;

        // Update active nav button colors
        const navKeys = ['pesanan', 'kas', 'belanja', 'absen'];
        navKeys.forEach(key => {
          const btn = document.getElementById('nav-' + key);
          if (key === screenKey) {
            btn.className = "flex flex-col items-center gap-0.5 text-indigo-600 font-bold transition";
          } else {
            btn.className = "flex flex-col items-center gap-0.5 text-slate-400 hover:text-slate-600 transition";
          }
        });

        // Manage FAB visibility
        const fabIcon = document.getElementById('fab-icon');
        if (screenKey === 'pesanan') {
          fab.classList.remove('hidden');
          fabIcon.setAttribute('data-lucide', 'clipboard-copy');
        } else if (screenKey === 'kas' && !currentLedgerEmployeeId) {
          fab.classList.remove('hidden');
          fabIcon.setAttribute('data-lucide', 'user-plus');
        } else {
          fab.classList.add('hidden');
        }
      } else {
        header.classList.add('hidden');
        nav.classList.add('hidden');
        fab.classList.add('hidden');
        appContent.className = "flex-grow overflow-y-auto no-scrollbar h-full flex flex-col justify-between";
      }

      lucide.createIcons();

      // Render Screen Content
      renderCurrentScreen();
    }

    function renderCurrentScreen() {
      const appContent = document.getElementById('app-content');
      appContent.scrollTop = 0;

      if (activeScreen === 'splash') {
        renderSplash(appContent);
      } else if (activeScreen === 'landing') {
        renderLanding(appContent);
      } else if (activeScreen === 'login') {
        renderLogin(appContent);
      } else if (activeScreen === 'register') {
        renderRegister(appContent);
      } else if (activeScreen === 'otp') {
        renderOtp(appContent);
      } else if (activeScreen === 'pesanan') {
        renderPesananScreen(appContent);
      } else if (activeScreen === 'kas') {
        renderKasScreen(appContent);
      } else if (activeScreen === 'belanja') {
        renderBelanjaScreen(appContent);
      } else if (activeScreen === 'absen') {
        renderAbsenScreen(appContent);
      }
      lucide.createIcons();
    }

    // --- NOTIFICATION / TOAST SYSTEM ---
    function triggerToast(type, message) {
      const container = document.getElementById('toast-container');
      const borderCol = type === 'success' ? 'border-emerald-500' : 'border-red-500';
      const icon = type === 'success' ? 'check-circle' : 'alert-triangle';
      const iconCol = type === 'success' ? 'text-emerald-500' : 'text-red-500';
      
      const toast = document.createElement('div');
      toast.className = `bg-white text-slate-800 px-4 py-3 rounded-xl shadow-lg border-l-4 ${borderCol} flex items-center justify-between pointer-events-auto transform translate-y-[-10px] opacity-0 transition-all duration-300 max-w-full`;
      toast.innerHTML = `
        <div class="flex items-center gap-2 min-w-0">
          <i data-lucide="${icon}" class="${iconCol} w-5 h-5 shrink-0"></i>
          <span class="text-xs font-semibold text-slate-800 truncate">${message}</span>
        </div>
        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600 shrink-0 ml-2"><i data-lucide="x" class="w-4 h-4"></i></button>
      `;
      container.appendChild(toast);
      lucide.createIcons();
      
      setTimeout(() => {
        toast.classList.remove('translate-y-[-10px]', 'opacity-0');
      }, 50);

      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-10px]');
        setTimeout(() => toast.remove(), 300);
      }, 3500);
    }

    function showCustomConfirm(title, message, onConfirm, yesLabel = 'Ya, Hapus') {
      const modal = document.createElement('div');
      modal.className = "fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity duration-300 opacity-0";
      modal.innerHTML = `
        <div class="bg-white rounded-2xl p-5 max-w-xs w-full border border-slate-100 shadow-2xl flex flex-col items-center text-center space-y-4 transform scale-95 transition-all duration-300 opacity-0">
          <div class="w-12 h-12 rounded-full bg-red-50 text-red-500 flex items-center justify-center">
            <i data-lucide="alert-triangle" class="w-6 h-6"></i>
          </div>
          <div class="space-y-1">
            <h4 class="font-extrabold text-slate-900 text-xs">${title}</h4>
            <p class="text-[9px] text-slate-400 leading-relaxed">${message}</p>
          </div>
          <div class="flex gap-2 w-full pt-1">
            <button id="confirmCancelBtn" class="flex-grow py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl text-[10px] font-bold transition">Batal</button>
            <button id="confirmYesBtn" class="flex-grow py-2 bg-red-500 hover:bg-red-600 text-white rounded-xl text-[10px] font-bold transition shadow-md shadow-red-100">${yesLabel}</button>
          </div>
        </div>
      `;

      document.body.appendChild(modal);
      lucide.createIcons();

      // Trigger animations
      setTimeout(() => {
        modal.classList.remove('opacity-0');
        modal.querySelector('.transform').classList.remove('scale-95', 'opacity-0');
      }, 50);

      const closeModal = () => {
        modal.classList.add('opacity-0');
        modal.querySelector('.transform').classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
          modal.remove();
        }, 300);
      };

      modal.querySelector('#confirmCancelBtn').addEventListener('click', () => {
        closeModal();
      });

      modal.querySelector('#confirmYesBtn').addEventListener('click', () => {
        onConfirm();
        closeModal();
      });
    }

    // --- INTERACTIVE BOTTOM SHEET MODEL CONTROLLER ---
    function openBottomSheet(contentHtml) {
      const backdrop = document.getElementById('modal-backdrop');
      const container = document.getElementById('modal-container');
      
      container.innerHTML = contentHtml;
      backdrop.classList.remove('hidden');
      
      setTimeout(() => {
        backdrop.classList.add('opacity-100');
        container.classList.remove('translate-y-full');
      }, 20);
      lucide.createIcons();
    }

    function closeBottomSheet() {
      const backdrop = document.getElementById('modal-backdrop');
      const container = document.getElementById('modal-container');
      
      container.classList.add('translate-y-full');
      backdrop.classList.remove('opacity-100');
      
      setTimeout(() => {
        backdrop.classList.add('hidden');
      }, 300);
    }

    // Dismiss modal if clicking backdrop
    document.getElementById('modal-backdrop').onclick = (e) => {
      if (e.target === document.getElementById('modal-backdrop')) {
        closeBottomSheet();
      }
    };

    // --- FAB ACTION CONTROLLER ---
    function handleFabClick() {
      if (activeScreen === 'pesanan') {
        // Open Bottom Sheet: Create New Order
        let selectOptions = employees.map(emp => `<option value="${emp.id}">${emp.nama}</option>`).join('');
        openBottomSheet(`
          <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-1"></div>
          <div class="flex justify-between items-center">
            <h3 class="font-extrabold text-slate-900 text-sm">Buat Pesanan Baru</h3>
            <button onclick="closeBottomSheet()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-4 h-4"></i></button>
          </div>
          <form id="orderForm" onsubmit="createNewOrder(event)" class="space-y-3 pt-2">
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">Pilih Karyawan</label>
              <select id="ordKaryawanId" onchange="handleOrderEmployeeChange(this.value)" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none" required>
                ${selectOptions}
              </select>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">Barang Pesanan</label>
              <input type="text" id="ordBarang" placeholder="Misal: Kopi Hitam Double Shot" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none" required>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">Uang Titipan Cash (Optional, Rp)</label>
              <input type="text" id="ordTitipan" oninput="formatNumberInput(this)" placeholder="Masukkan jika ada uang cash" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none">
              <span id="titipanHelper" class="text-[9px] text-emerald-600 font-bold block mt-1"></span>
            </div>
            <button type="submit" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold transition shadow-lg shadow-indigo-100">Buat Pesanan</button>
          </form>
        `);
        // Trigger initial calculation check
        if (employees.length > 0) {
          handleOrderEmployeeChange(document.getElementById('ordKaryawanId').value);
        }
      } else if (activeScreen === 'kas') {
        // Open Bottom Sheet: Create New Employee
        openBottomSheet(`
          <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-1"></div>
          <div class="flex justify-between items-center">
            <h3 class="font-extrabold text-slate-900 text-sm">Daftarkan Karyawan Baru</h3>
            <button onclick="closeBottomSheet()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-4 h-4"></i></button>
          </div>
          <form id="employeeForm" onsubmit="createNewEmployee(event)" class="space-y-3 pt-2">
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">Nama Karyawan</label>
              <input type="text" id="empNama" placeholder="Nama Lengkap" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none" required>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">No. WhatsApp (Aktif)</label>
              <input type="tel" id="empTel" placeholder="6281234567890" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none" required>
              <span class="text-[9px] text-slate-400 mt-1 block">Format dimulai kode negara, misal: 62812...</span>
            </div>
            <div>
              <label class="text-[10px] font-bold text-slate-400 block mb-1">Setoran Deposit Awal (Optional, Rp)</label>

    function promptCompleteOrder(ordId) {
      const ord = orders.find(o => o.id === ordId);
      if (!ord) return;

      openBottomSheet(`
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-1"></div>
        <div class="flex justify-between items-center">
          <h3 class="font-extrabold text-slate-900 text-sm">Selesaikan Pembelian</h3>

          ${ord.titipan > 0 ? `<p class="text-[10px] text-slate-500">Titipan Uang: Rp ${ord.titipan.toLocaleString('id-ID')}</p>` : ''}
        </div>
        <form onsubmit="completeOrder(event, '${ordId}')" class="space-y-3">
          <div>
            <label class="text-[10px] font-bold text-slate-400 block mb-1">Harga Pembelian Asli (Rp)</label>
            <input type="text" id="realHargaInput" oninput="formatNumberInput(this)" placeholder="Masukkan harga asli dari struk" class="w-full p-2.5 bg-slate-50 text-xs rounded-lg border border-slate-200 focus:outline-none" required>
          </div>
          <button type="submit" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-xl text-xs font-bold transition shadow-lg shadow-emerald-100">Beli & Konfirmasi</button>
        </form>
      `);
    }

    function completeOrder(e, ordId) {
      e.preventDefault();
      const realHarga = parseFormattedNumber(document.getElementById('realHargaInput').value);
      const ord = orders.find(o => o.id === ordId);
      if (!ord) return;

      ord.realHarga = realHarga;
      const emp = employees.find(em => em.id === ord.karyawanId);

      if (ord.titipan === 0) {
        // Talangan transaction - deduct actual price directly from balance upon purchase
        ord.status = 'SELESAI';
        
        if (emp) {
          emp.hutang += realHarga;
          saveDB('employees', employees);
        }

        const ledId = 'led-' + Date.now();
        const newLed = { 
          id: ledId, 
          karyawanId: ord.karyawanId, 
          tipe: 'PESANAN', 
          nominal: -realHarga, 
          keterangan: 'Beli: ' + ord.barang, 
          lunas: false,
          tanggal: new Date().toISOString() 
        };
        ledger.push(newLed);
        saveDB('ledger', ledger);
        
        closeBottomSheet();
        triggerToast('success', 'Pesanan selesai! Saldo otomatis diperbarui.');
      } else {
        // Cash payment transaction
        const kembalian = ord.titipan - realHarga;
        ord.kembalian = kembalian;

        if (kembalian > 0) {
          // Change is due
          ord.status = 'MENUNGGU_KEMBALIAN';
          closeBottomSheet();
          triggerToast('success', `Pembelian selesai! Kembalian Rp ${kembalian.toLocaleString('id-ID')} perlu diserahkan.`);
        } else if (kembalian < 0) {
          // Not enough cash titipan, remaining becomes debt
          const deficit = Math.abs(kembalian);
          ord.status = 'SELESAI';
          
          if (emp) {
            emp.hutang += deficit;
            saveDB('employees', employees);
          }

          // Log the deficit in employee ledger
          const ledId = 'led-' + Date.now();
          const newLed = { 
            id: ledId, 
            karyawanId: ord.karyawanId, 
            tipe: 'PESANAN', 
            nominal: -deficit, 
            keterangan: `Kurang bayar cash: ${ord.barang} (Titip: ${ord.titipan}, Beli: ${realHarga})`, 
            lunas: false,
            tanggal: new Date().toISOString() 
          };
          ledger.push(newLed);
          saveDB('ledger', ledger);

          closeBottomSheet();
          triggerToast('success', `Pembelian selesai! Kekurangan Rp ${deficit.toLocaleString('id-ID')} dicatat sebagai hutang.`);
        } else {
          // Exact amount paid
          ord.status = 'SELESAI';
          closeBottomSheet();
          triggerToast('success', 'Pembelian selesai dengan uang pas!');
        }
      }
      saveDB('orders', orders);
      renderCurrentScreen();
    }

    function giveChangeBack(ordId) {
      const ord = orders.find(o => o.id === ordId);
      if (!ord) return;

      ord.status = 'SELESAI';
      saveDB('orders', orders);
      triggerToast('success', 'Kembalian berhasil diserahkan! Status pesanan Selesai.');
      renderCurrentScreen();
    }

    function payDebtWithDeposit(empId, amount) {
      const emp = employees.find(em => em.id === empId);
      if (!emp) return;

      emp.deposit -= amount;
      emp.hutang -= amount;
      saveDB('employees', employees);

      // Mark corresponding unpaid items in ledger as lunas (FIFO)
      let amountToDistribute = amount;
      const unpaidItems = ledger
        .filter(l => l.karyawanId === empId && l.tipe === 'PESANAN' && l.nominal < 0 && !l.lunas)
        .sort((a, b) => a.tanggal.localeCompare(b.tanggal));
      
      for (let item of unpaidItems) {
        const cost = Math.abs(item.nominal);
        if (amountToDistribute >= cost) {
          item.lunas = true;
          amountToDistribute -= cost;
        } else {
          break;
        }
      }

      // Log in ledger
      const ledId = 'led-' + Date.now();
      const newLed = { 
        id: ledId, 
        karyawanId: empId, 
        tipe: 'TOPUP', 
        nominal: 0,
        keterangan: `Potong deposit untuk bayar talangan sebesar Rp ${amount.toLocaleString('id-ID')}`, 
        tanggal: new Date().toISOString() 
      };
      ledger.push(newLed);
      saveDB('ledger', ledger);

      closeBottomSheet();
      triggerToast('success', `Pembayaran menggunakan deposit sebesar Rp ${amount.toLocaleString('id-ID')} berhasil!`);
      renderCurrentScreen();
    }

    function handleTopUp(e, empId) {
      e.preventDefault();
      const nominal = parseFormattedNumber(document.getElementById('topupNominal').value);
      const keterangan = capitalizeFirst(document.getElementById('topupKeterangan').value) || 'Setor Tunai (Top Up)';
      const emp = employees.find(em => em.id === empId);
      if (!emp) return;

      // Distribute payment to reduce hutang and increase deposit if surplus
      let amountLeft = nominal;
      if (emp.hutang > 0) {
        if (amountLeft >= emp.hutang) {
          amountLeft -= emp.hutang;
          emp.hutang = 0;
        } else {
          emp.hutang -= amountLeft;
          amountLeft = 0;
        }
      }
      if (amountLeft > 0) {
        emp.deposit += amountLeft;
      }
      saveDB('employees', employees);

      // Distribute payment to mark oldest unpaid ledger items as lunas
      let paymentToDistribute = nominal;
      const unpaidItems = ledger
        .filter(l => l.karyawanId === empId && l.tipe === 'PESANAN' && l.nominal < 0 && !l.lunas)
        .sort((a, b) => a.tanggal.localeCompare(b.tanggal));
      
      for (let item of unpaidItems) {
        const cost = Math.abs(item.nominal);
        if (paymentToDistribute >= cost) {
          item.lunas = true;
          paymentToDistribute -= cost;
        } else {
          break;
        }
      }

      // Log in ledger
      const ledId = 'led-' + Date.now();
      const newLed = { id: ledId, karyawanId: empId, tipe: 'TOPUP', nominal, keterangan, tanggal: new Date().toISOString() };
      ledger.push(newLed);
      saveDB('ledger', ledger);

      closeBottomSheet();
      triggerToast('success', 'Transaksi Top Up tunai berhasil dicatat!');
      renderCurrentScreen();
    }

        id: 'hist-' + Date.now(),
        tanggal: new Date().toISOString(),
        total: totalBelanja,
        itemCount: shoppingList.length,
        items: shoppingList
      };

      shoppingHistory.push(record);
      saveDB('shoppingHistory', shoppingHistory);

      // Clear current list
      shoppingList = [];
      saveDB('shoppingList', shoppingList);

      triggerToast('success', 'Belanja selesai! Rekonsiliasi struk tersimpan di riwayat.');
      renderCurrentScreen();
    }

    function handleShoppingItemNameChange(input) {
      const name = input.value.trim();
      if (!name) return;

      let foundPrice = null;
      
      // Look up inside current list
      const itemInCurrent = shoppingList.find(item => item.nama.toLowerCase() === name.toLowerCase());
      if (itemInCurrent) {
        foundPrice = itemInCurrent.harga;
      } else {
        // Look up inside historical records (newest to oldest)
        for (let i = shoppingHistory.length - 1; i >= 0; i--) {
          const hist = shoppingHistory[i];
          if (hist.items) {
            const histItem = hist.items.find(item => item.nama.toLowerCase() === name.toLowerCase());
            if (histItem) {
              foundPrice = histItem.harga;
              break;
            }
          }
        }
      }

      if (foundPrice !== null) {
        const priceInput = document.getElementById('shopItemHarga');
        if (priceInput) {
          priceInput.value = foundPrice.toLocaleString('id-ID');
        }
      }
    }


    // --- SCREEN 4: ABSENSI SCREEN LOGIC ---
    function renderAbsenScreen(container) {
      // Find today's attendance logs

      let buttonStateClass = 'bg-emerald-500 hover:bg-emerald-600 border-emerald-100 shadow-emerald-500/20';

      let statusText = 'Status: Belum Absen Hari Ini';

      if (todayLog) {
        if (todayLog.checkIn && !todayLog.checkOut) {
          buttonStateClass = 'bg-red-500 hover:bg-red-600 border-red-100 shadow-red-500/20';
          buttonText = 'CHECK OUT';
          statusText = `Status: Sudah Masuk (Check-In: ${todayLog.checkIn})`;
        } else if (todayLog.checkIn && todayLog.checkOut) {
          buttonStateClass = 'bg-slate-400/80 cursor-not-allowed border-slate-100 shadow-slate-400/10';
          buttonText = 'SELESAI';
          statusText = `Status: Kerja Hari Ini Selesai (${todayLog.checkIn} - ${todayLog.checkOut})`;
        }
      }

      // Filtered logs
      let filteredLogs = attendance.filter(log => {
        if (!log.checkOut) return false; // Don't show active checkins in historical logs
        const logDate = log.tanggal;
        return logDate >= attendanceFilterFrom && logDate <= attendanceFilterTo;
      }).sort((a,b) => b.tanggal.localeCompare(a.tanggal));

      let logListHtml = '';
      if (filteredLogs.length === 0) {
        logListHtml = `
          <div class="py-6 text-center text-xs text-slate-400 font-semibold">Tidak ada riwayat absen di rentang tanggal ini</div>
        `;
      } else {
        logListHtml = filteredLogs.map(log => {
          const dateStr = new Date(log.tanggal).toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });

          return `
            <div class="px-4 py-2.5 flex justify-between items-center text-xs">
              <span class="font-medium text-slate-600">${dateStr}</span>
              <span class="text-emerald-600 font-extrabold font-mono">${log.checkIn} - ${log.checkOut}</span>
            </div>
          `;
        }).join('');
      }

      container.innerHTML = `
        <!-- Digital Clock Display Widget -->
        <div class="bg-white py-6 rounded-2xl border border-slate-200/60 shadow-sm text-center space-y-1.5">
          <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">${new Date().toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>
          <h1 id="digitalClock" class="text-4xl font-extrabold text-slate-800 tracking-tight font-mono">00:00:00</h1>
        </div>

        <!-- Attendance Button -->
        <div class="flex flex-col items-center py-6">
          <button onclick="handleAbsencePulse()" class="w-36 h-36 rounded-full flex flex-col items-center justify-center text-white border-8 transition-all duration-300 active:scale-95 shadow-xl ${buttonStateClass}">
            <i data-lucide="fingerprint" class="w-12 h-12 mb-1.5"></i>
            <span class="text-sm font-extrabold tracking-wider">${buttonText}</span>
          </button>
          <p class="text-xs text-slate-500 mt-4 font-semibold">${statusText}</p>
        </div>

        <!-- Historical Report Logs -->
        <div class="border-t border-slate-200/80 pt-4 space-y-3">
          <div class="flex justify-between items-center">
            <h4 class="text-xs font-bold text-slate-400 tracking-wide uppercase">Laporan Bulanan Mandiri</h4>
            <button onclick="promptAbsenceFilterRange()" class="text-[10px] text-indigo-600 font-bold flex items-center gap-1">
              <i data-lucide="calendar" class="w-3.5 h-3.5"></i> Rentang Waktu
            </button>
          </div>

          <div class="bg-white rounded-xl border border-slate-200/60 divide-y divide-slate-100 overflow-hidden shadow-sm">
            ${logListHtml}
          </div>
        </div>
      `;
    }

    function handleAbsencePulse() {
      const today = new Date().toISOString().split('T')[0];
      const todayLog = attendance.find(a => a.tanggal === today);
      const currentTime = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace('.', ':');

      if (!todayLog) {
        // Create Check In log
        const log = { tanggal: today, checkIn: currentTime, checkOut: null };
        attendance.push(log);
        saveDB('attendance', attendance);
        triggerToast('success', `Check In masuk berhasil dicatat pukul ${currentTime}!`);
      } else if (todayLog.checkIn && !todayLog.checkOut) {
        // Create Check Out log
        todayLog.checkOut = currentTime;
        saveDB('attendance', attendance);
        triggerToast('success', `Check Out pulang berhasil dicatat pukul ${currentTime}!`);
      } else {
        triggerToast('danger', 'Anda sudah melakukan absen masuk & pulang untuk hari ini!');
      }

      renderCurrentScreen();
    }

    // --- SYNC SYSTEM SIMULATION ---

    function triggerSyncSimulation() {
      const icon = document.getElementById('syncIcon');
      const text = document.getElementById('syncText');

      if (localMode === 'offline') {
        localMode = 'syncing';
        icon.className = "w-3.5 h-3.5 text-blue-300 animate-spin";
        text.className = "text-[9px] font-bold text-blue-300";
        text.innerText = "Sinkron...";
        
        setTimeout(() => {
          localMode = 'synced';
          icon.className = "w-3.5 h-3.5 text-emerald-400";
          text.className = "text-[9px] font-bold text-emerald-400";
          text.innerText = "Cloud";
          triggerToast('success', 'Data lokal berhasil dicadangkan ke Cloud Supabase!');
        }, 1500);
      } else if (localMode === 'synced') {
        localMode = 'offline';
        icon.className = "w-3.5 h-3.5 text-amber-300";
        text.className = "text-[9px] font-bold text-amber-300";
        text.innerText = "Lokal";
        triggerToast('success', 'Mode lokal offline aktif.');
      }
    }

    function handleOtpSubmit(e) {
      e.preventDefault();
      const code = document.getElementById('otpCode').value.trim();

      if (code !== '1234') {
        triggerToast('danger', 'Kode OTP salah! Silakan coba lagi.');
        return;
      }

      // Successful verification
      const existing = employees.find(emp => emp.telepon === pendingTel);
      if (!existing && pendingNama !== 'User OB') {
        const id = 'emp-' + Date.now();
        employees.push({ id, nama: pendingNama, telepon: pendingTel, deposit: 0, hutang: 0 });
        saveDB('employees', employees);
      }

      localStorage.setItem('ob_session', JSON.stringify({ tel: pendingTel, nama: pendingNama }));
      triggerToast('success', 'Verifikasi berhasil! Selamat datang.');
      switchScreen('pesanan');
    }
